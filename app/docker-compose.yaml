version: '3.8'
services:
  app:
    image: web-app:latest
    container_name: web_app
    ports:
      - "80:5000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSL_CA=./root.crt
    restart: unless-stopped